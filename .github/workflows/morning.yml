name: Morning Reading List

on:
  schedule:
    # 7am NZDT (UTC+13) = 18:00 UTC
    # After NZ daylight saving ends (first Sunday April), change to 19:00 UTC for 7am NZST
    - cron: '0 18 * * *'
  workflow_dispatch:  # Manual trigger for testing

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      - name: Generate reading list
        env:
          FT_RSS_URL: ${{ secrets.FT_RSS_URL }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: python src/main.py

      - name: Commit and push reading list
        run: |
          git config user.name "morning-reader[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ docs/articles/
          git diff --staged --quiet && echo "No changes to commit" || (
            git commit -m "reading list $(date -u +%Y-%m-%d)" &&
            git push
          )
